spring:
  application:
    name: exodia-inventario

  datasource:
    url: jdbc:postgresql://localhost:5432/exodia_inventario
    username: ${DB_USERNAME:exodia}
    password: ${DB_PASSWORD:exodia}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        default_schema: public
        jdbc:
          batch_size: 50
        order_inserts: true
        order_updates: true
        format_sql: false

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  jackson:
    default-property-inclusion: non_null
    serialization:
      write-dates-as-timestamps: false

server:
  port: 8080

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: when-authorized

inventario:
  barcode:
    prefijo-defecto: INV
    longitud-padding: 8
  reserva:
    horas-expiracion-defecto: 48
